<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>History - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>History</h1>
          <p class="subtitle">
            Check the latest episode change saved for each donghua title.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>
      </header>

      <section class="function-panel" aria-label="History">
        <h2>Latest updates</h2>
        <p>
          Each show row displays the most recent episode change, including the
          old episode count, new episode count, and update date.
        </p>
        <a class="action-link" href="index.html#history">View Show History</a>
      </section>
    </main>
  </body>
</html>
