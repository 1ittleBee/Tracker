<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Episode - Donghua Episode Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Add Episode</h1>
          <p class="subtitle">
            Add progress to a donghua by increasing its watched episode count.
          </p>
        </div>
        <a class="back-link" href="index.html" aria-label="Back to tracker">←</a>
      </header>

      <section class="function-panel" aria-label="Add episode">
        <h2>Episode controls</h2>
        <p>
          Every show row has a plus button for adding one episode. You can also
          use edit episode when you need to jump directly to a specific count.
        </p>
        <a class="action-link" href="index.html#add-episode">Go to Episode List</a>
      </section>
    </main>
  </body>
</html>
