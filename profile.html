<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Profile</h1>
          <p class="subtitle">
            View your Google account details and tracker summary from the app
            drawer after signing in.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>
      </header>

      <section class="function-panel" aria-label="Profile details">
        <h2>What this page does</h2>
        <p>
          The drawer profile shows your account name, email, avatar, saved show
          count, watched episode count, and online status.
        </p>
        <a class="action-link" href="index.html">Open Profile Drawer</a>
      </section>
    </main>
  </body>
</html>
