<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Shows - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Add Shows</h1>
          <p class="subtitle">
            Add one donghua title or paste multiple titles with one name per
            line.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>
      </header>

      <section class="panel add-show-page" aria-label="Add shows">
        <div class="auth-strip">
          <button id="addPageSignInBtn" type="button">Sign In with Google</button>
          <button id="addPageSignOutBtn" type="button">Sign Out</button>
          <span id="addPageUserInfo">Checking sign-in...</span>
        </div>

        <div class="controls single-action">
          <textarea
            id="addPageShowNames"
            placeholder="Enter donghua names, one per line"
          ></textarea>
          <button class="add-btn" id="addPageAddShowsBtn" type="button">
            + Add Shows
          </button>
        </div>

        <p class="form-status" id="addPageStatus" role="status"></p>
      </section>
    </main>
    <script type="module" src="add-shows.js"></script>
  </body>
</html>
