<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Shows - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Add Shows</h1>
          <p class="subtitle">
            Add one donghua title or paste multiple titles with one name per
            line.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>
      </header>

      <section class="function-panel" aria-label="Add shows">
        <h2>How it works</h2>
        <p>
          Use the main tracker input to enter titles. When you click Add Shows,
          each title is saved to Firebase while you are signed in.
        </p>
        <a class="action-link" href="index.html#add-shows">Go to Add Shows</a>
      </section>
    </main>
  </body>
</html>
