<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Import and Export - Donghua Episode Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Import and Export</h1>
          <p class="subtitle">
            Back up tracker data with JSON or export a spreadsheet-friendly CSV.
          </p>
        </div>
        <a class="back-link" href="index.html" aria-label="Back to tracker">←</a>
      </header>

      <section class="function-panel" aria-label="Import and export">
        <h2>Backup tools</h2>
        <p>
          Export JSON for full backups, import JSON to restore saved data, or
          export CSV to review your tracker in a spreadsheet.
        </p>
        <a class="action-link" href="index.html#backup">Go to Backup Tools</a>
      </section>
    </main>
  </body>
