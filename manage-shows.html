<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Shows - Donghua Episode Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Manage Shows</h1>
          <p class="subtitle">
            Rename saved donghua titles or delete shows you no longer need.
          </p>
        </div>
        <a class="back-link" href="index.html" aria-label="Back to tracker">←</a>
      </header>

      <section class="function-panel" aria-label="Manage shows">
        <h2>Rename and delete</h2>
        <p>
          Use the Rename button on a show row to change its title. Use Delete
          when you want to remove a title from your tracker.
        </p>
        <a class="action-link" href="index.html#manage-shows">Go to Manage Shows</a>
      </section>
    </main>
  </body>
</html>
