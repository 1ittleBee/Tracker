<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frequently Used - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Frequently Used</h1>
          <p class="subtitle">
            Open a focused view of the shows you update most often.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>

      <section class="function-panel" aria-label="Frequently used">
        <h2>Top updates</h2>
        <p>
          The Frequently Used button shows your top ten shows by update count,
          making repeat tracking faster.
        </p>
        <a class="action-link" href="index.html">Go to Frequently Used</a>
      </section>
    </main>
  </body>
</html>
