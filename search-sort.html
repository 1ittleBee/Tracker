<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search and Sort - Donghua Episode Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Search and Sort</h1>
          <p class="subtitle">
            Find shows quickly and organize your list by creation time, title,
            or episode count.
          </p>
        </div>
        <a class="back-link" href="index.html" aria-label="Back to tracker">←</a>
      </header>

      <section class="function-panel" aria-label="Search and sort">
        <h2>List controls</h2>
        <p>
          Use search to filter saved titles, sort to reorder results, and page
          controls to move through longer lists.
        </p>
        <a class="action-link" href="index.html#search-sort">Go to Search and Sort</a>
      </section>
    </main>
  </body>
