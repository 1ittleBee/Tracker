<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Donghua Episode Tracker</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f6;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --border: #d9e2ec;
        --text: #172033;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --success: #15803d;
        --warning: #b45309;
        --danger: #dc2626;
        --teal: #0f766e;
        --shadow: 0 18px 45px rgba(17, 24, 39, 0.09);
        --focus: 0 0 0 3px rgba(37, 99, 235, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #dbeafe 0, transparent 34rem),
          var(--bg);
        color: var(--text);
        transition: background 0.3s, color 0.3s;
      }

      body.dark-mode {
        color-scheme: dark;
        --bg: #101623;
        --surface: #172033;
        --surface-soft: #202b3f;
        --border: #31415a;
        --text: #f8fafc;
        --muted: #a9b8cc;
        --primary: #60a5fa;
        --primary-hover: #3b82f6;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #f87171;
        --teal: #2dd4bf;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
        --focus: 0 0 0 3px rgba(96, 165, 250, 0.28);
        background: radial-gradient(circle at top left, #1e3a5f 0, transparent 34rem),
          var(--bg);
      }

      .app-shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.85rem, 4vw, 3rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 10px 0 0;
        max-width: 680px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      #authSection {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
        min-width: min(100%, 360px);
      }

      #userInfo {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 0.9rem;
        text-align: right;
      }

      .panel {
        background: color-mix(in srgb, var(--surface) 94%, transparent);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .stat-card {
        min-height: 104px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 12px 30px rgba(17, 24, 39, 0.06);
      }

      .stat-label {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .stat-value {
        margin: 0;
        color: var(--text);
        font-size: clamp(1.45rem, 3vw, 2.1rem);
        line-height: 1;
        font-weight: 900;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stat-note {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.84rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .controls,
      .search-sort {
        display: grid;
        gap: 12px;
      }

      .controls {
        grid-template-columns: repeat(6, minmax(124px, 1fr));
        align-items: end;
        margin-bottom: 14px;
      }

      .controls textarea {
        grid-column: 1 / -1;
      }

      .search-sort {
        grid-template-columns: minmax(220px, 1fr) repeat(3, auto);
        align-items: center;
        margin-bottom: 16px;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-weight: 700;
        font-size: 0.86rem;
      }

      .show {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        margin: 10px 0;
        border-radius: 8px;
        transition: border-color 0.2s, transform 0.2s, background 0.3s,
          color 0.3s;
      }

      .show:hover {
        border-color: color-mix(in srgb, var(--primary) 55%, var(--border));
        transform: translateY(-1px);
      }

      .show-info {
        flex: 1;
        min-width: 0;
      }

      .show-info strong {
        display: block;
        margin-bottom: 8px;
        overflow-wrap: anywhere;
        font-size: 1.05rem;
      }

      .show-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .episode-badge,
      .usage-badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.82rem;
        font-weight: 800;
      }

      .episode-badge {
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
        color: var(--primary);
      }

      .usage-badge {
        background: color-mix(in srgb, var(--teal) 14%, var(--surface));
        color: var(--teal);
      }

      .show-info .history {
        font-size: 0.9rem;
        color: var(--muted);
        margin-top: 8px;
        overflow-wrap: anywhere;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(5, minmax(86px, 1fr));
        width: min(100%, 520px);
        flex-shrink: 0;
        gap: 8px;
      }

      button,
      select,
      input,
      textarea {
        min-height: 40px;
        border: 1px solid var(--border);
        padding: 9px 12px;
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
      }

      button {
        width: 100%;
        min-width: 0;
        cursor: pointer;
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
        transition: transform 0.15s, filter 0.15s, box-shadow 0.15s,
          background 0.15s;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(0.98);
      }

      button:focus-visible,
      select:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: none;
        box-shadow: var(--focus);
        border-color: var(--primary);
      }

      button:disabled,
      select:disabled,
      input:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.52;
        transform: none;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        resize: vertical;
        line-height: 1.45;
      }

      input,
      select {
        width: 100%;
      }

      .add-btn {
        background: var(--success);
        color: white;
      }

      .update-btn {
        background: var(--primary);
        color: white;
      }

      .edit-btn {
        background: var(--warning);
        color: white;
      }

      .inc-btn {
        background: var(--success);
        color: white;
      }

      .dec-btn {
        background: #7c3aed;
        color: white;
      }

      .delete-btn {
        background: var(--danger);
        color: white;
      }

      .export-btn {
        background: var(--primary);
        color: white;
      }

      .freq-btn {
        background: var(--teal);
        color: white;
      }

      .import-btn {
        background: #475569;
        color: white;
      }

      .pagination-btn {
        background: var(--surface-soft);
        color: var(--text);
      }

      #signInBtn {
        background: var(--text);
        color: var(--surface);
      }

      #signOutBtn {
        background: var(--surface-soft);
        color: var(--text);
      }

      #authSection button {
        flex: 1 1 160px;
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 18px;
      }

      .pagination button {
        width: 120px;
      }

      #pageInfo {
        color: var(--muted);
        font-weight: 800;
        min-width: 130px;
        text-align: center;
      }

      .empty-state {
        margin: 18px 0;
        padding: 26px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        background: color-mix(in srgb, var(--surface) 78%, transparent);
        color: var(--muted);
        text-align: center;
      }

      .empty-state strong {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 1.05rem;
      }

      @media (max-width: 980px) {
        .topbar,
        #authSection {
          align-items: stretch;
        }

        .topbar {
          flex-direction: column;
        }

        #authSection {
          justify-content: flex-start;
        }

        #userInfo {
          text-align: left;
        }

        .controls,
        .search-sort,
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }

        .search-sort #searchInput {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 680px) {
        .app-shell {
          width: min(100% - 20px, 1120px);
          padding: 18px 0;
        }

        .panel {
          padding: 12px;
        }

        .controls,
        .search-sort,
        .stats-grid {
          grid-template-columns: 1fr;
        }

        .show {
          flex-direction: column;
        }

        .buttons {
          width: 100%;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .buttons button {
          width: 100%;
        }

        .pagination {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Donghua Episode Tracker</h1>
          <p class="subtitle">
            Track your watch progress, jump between pages quickly, and keep
            your list synced with Firebase.
          </p>
        </div>

        <div id="authSection" aria-label="Authentication">
          <button id="signInBtn">Sign In with Google</button>
          <button id="signOutBtn">Sign Out</button>
          <div id="userInfo"></div>
        </div>
      </header>

      <section class="stats-grid" aria-label="Tracker statistics">
        <article class="stat-card">
          <p class="stat-label">Total Shows</p>
          <p class="stat-value" id="totalShowsStat">0</p>
          <p class="stat-note">Saved titles</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">In Progress</p>
          <p class="stat-value" id="inProgressStat">0</p>
          <p class="stat-note">Episode count above 0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">Episodes Watched</p>
          <p class="stat-value" id="episodesWatchedStat">0</p>
          <p class="stat-note">Across all shows</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">Most Used</p>
          <p class="stat-value" id="mostUsedStat">-</p>
          <p class="stat-note" id="mostUsedNote">No usage yet</p>
        </article>
      </section>

      <section class="panel" aria-label="Tracker controls">
        <div class="controls">
          <textarea
            id="showNames"
            placeholder="Enter donghua names, one per line"
          ></textarea>
          <button class="add-btn" id="addShowsBtn">+ Add Shows</button>
          <button class="export-btn" id="exportJSONBtn">Export JSON</button>
          <button class="import-btn" id="importBtn">Import JSON</button>
          <input
            type="file"
            id="importFile"
            accept="application/json,.json"
            style="display: none"
          />
          <button class="export-btn" id="exportCSVBtn">Export CSV</button>
          <button class="export-btn" id="darkModeBtn">Dark Mode</button>
          <button class="freq-btn" id="frequentBtn">Frequently Used</button>
        </div>

        <div class="search-sort">
          <input type="text" id="searchInput" placeholder="Search shows..." />
          <select id="sortSelect" aria-label="Sort shows">
            <option value="created">Sort by Creation Time</option>
            <option value="name">Sort by Name (A-Z)</option>
            <option value="ep">Sort by Episode (Highest)</option>
          </select>
          <label>
            Shows per page
            <select id="pageSizeSelect">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </label>
          <label>
            Jump to page
            <input type="number" id="jumpPage" min="1" />
          </label>
        </div>
      </section>

      <section id="showList" aria-live="polite"></section>

      <nav class="pagination" aria-label="Pagination">
        <button class="pagination-btn" id="prevBtn">Previous</button>
        <span id="pageInfo"></span>
        <button class="pagination-btn" id="nextBtn">Next</button>
      </nav>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        doc,
        setDoc,
        onSnapshot,
        runTransaction,
        deleteDoc,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        signOut as firebaseSignOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

      // --- Firebase config ---
      const firebaseConfig = {
        apiKey: "AIzaSyCLPxspkEMpxoXkFAVLrE8ZENz3PuIGQ0M",
        authDomain: "donghuatracker.firebaseapp.com",
        projectId: "donghuatracker",
        storageBucket: "donghuatracker.appspot.com",
        messagingSenderId: "235741425337",
        appId: "1:235741425337:web:7eaaba2623dab340c47568",
        measurementId: "G-XKF22H3TTD",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      let shows = {};
      let currentPage = 1;
      let showsPerPage = 10;
      let darkMode = localStorage.getItem("darkMode") === "true";
      let unsubscribeShows = null;
      document.body.classList.toggle("dark-mode", darkMode);

      // --- Authentication ---
      const signInBtn = document.getElementById("signInBtn");
      const signOutBtn = document.getElementById("signOutBtn");
      const appControlIds = [
        "showNames",
        "addShowsBtn",
        "exportJSONBtn",
        "importBtn",
        "exportCSVBtn",
        "frequentBtn",
        "searchInput",
        "sortSelect",
        "pageSizeSelect",
        "jumpPage",
        "prevBtn",
        "nextBtn",
      ];

      function setAppControlsEnabled(enabled) {
        appControlIds.forEach((id) => {
          document.getElementById(id).disabled = !enabled;
        });
        signInBtn.disabled = enabled;
        signOutBtn.disabled = !enabled;
      }
      setAppControlsEnabled(false);

      signInBtn.addEventListener("click", async () => {
        try {
          await signInWithPopup(auth, provider);
        } catch (e) {
          alert("Sign-in failed: " + e.message);
        }
      });

      signOutBtn.addEventListener("click", async () => {
        try {
          await firebaseSignOut(auth);
        } catch (e) {
          console.error(e);
        }
      });

      onAuthStateChanged(auth, (user) => {
        const userInfo = document.getElementById("userInfo");
        if (user) {
          userInfo.textContent = `Logged in as: ${user.email}`;
          setAppControlsEnabled(true);
          initRealtime();
        } else {
          stopRealtime();
          userInfo.textContent = "Not signed in";
          setAppControlsEnabled(false);
          shows = {};
          render();
        }
      });

      // --- Firestore Realtime Listener ---
      function getShowsCollection() {
        if (!auth.currentUser) throw new Error("User is not signed in");
        return collection(db, "shows");
      }

      function getShowRef(show) {
        return doc(getShowsCollection(), show);
      }

      function stopRealtime() {
        if (unsubscribeShows) {
          unsubscribeShows();
          unsubscribeShows = null;
        }
      }

      function isValidShowName(name) {
        if (!name || name.includes("/")) {
          alert('Show names cannot be empty or contain "/".');
          return false;
        }
        return true;
      }

      function normalizeShow(data = {}) {
        data = data || {};
        return {
          ep: Number.isFinite(Number(data.ep)) ? Math.max(0, Number(data.ep)) : 0,
          history: Array.isArray(data.history) ? data.history.map(String) : [],
          usage: Number.isFinite(Number(data.usage))
            ? Math.max(0, Number(data.usage))
            : 0,
          created: Number.isFinite(Number(data.created))
            ? Number(data.created)
            : Date.now(),
        };
      }

      function initRealtime() {
        stopRealtime();
        unsubscribeShows = onSnapshot(
          getShowsCollection(),
          (snapshot) => {
            shows = {};
            snapshot.forEach((docSnap) => {
              const data = docSnap.data();
              shows[docSnap.id] = normalizeShow(data);
            });
            render();
          },
          (error) => {
            console.error("Realtime listener failed:", error);
            alert("Could not load your shows. Check Firestore permissions.");
          }
        );
      }

      async function saveShowToDB(name) {
        if (!auth.currentUser) return alert("Please sign in");
        try {
          await setDoc(getShowRef(name), shows[name]);
        } catch (e) {
          console.error("Error saving show:", e);
          throw e;
        }
      }

      // --- Core Functions ---
      async function addShows() {
        if (!auth.currentUser) return alert("Please sign in");
        const input = document.getElementById("showNames").value.trim();
        if (!input) return;
        const names = input
          .split("\n")
          .map((n) => n.trim())
          .filter((n) => n);
        if (!names.every(isValidShowName)) return;
        try {
          await Promise.all(
            names.map((name) => {
              if (!shows[name])
                shows[name] = normalizeShow({ created: Date.now() });
              return saveShowToDB(name);
            })
          );
          document.getElementById("showNames").value = "";
          render();
        } catch (e) {
          alert("Failed to save one or more shows.");
        }
      }

      async function incrementEpisode(show) {
        if (!auth.currentUser) return alert("Please sign in");
        const showRef = getShowRef(show);
        try {
          await runTransaction(db, async (transaction) => {
            const docSnap = await transaction.get(showRef);
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            const oldEp = data.ep || 0;
            const newEp = oldEp + 1;
            transaction.update(showRef, {
              ep: newEp,
              history: [
                ...(data.history || []),
                `${oldEp} -> ${newEp} on ${new Date().toLocaleDateString()}`,
              ],
              usage: (data.usage || 0) + 1,
            });
          });
        } catch (e) {
          console.error(e);
        }
      }

      async function decrementEpisode(show) {
        if (!auth.currentUser) return alert("Please sign in");
        const showRef = getShowRef(show);
        try {
          await runTransaction(db, async (transaction) => {
            const docSnap = await transaction.get(showRef);
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            const oldEp = data.ep || 0;
            if (oldEp <= 0) return;
            const newEp = oldEp - 1;
            transaction.update(showRef, {
              ep: newEp,
              history: [
                ...(data.history || []),
                `${oldEp} -> ${newEp} on ${new Date().toLocaleDateString()}`,
              ],
              usage: (data.usage || 0) + 1,
            });
          });
        } catch (e) {
          console.error(e);
        }
      }

      async function updateEpisode(show) {
        if (!auth.currentUser) return alert("Please sign in");
        const epInput = prompt(`Enter last watched episode for ${show}:`);
        const ep = parseInt(epInput);
        if (isNaN(ep) || ep < 0) return;
        const showRef = getShowRef(show);
        try {
          await runTransaction(db, async (transaction) => {
            const docSnap = await transaction.get(showRef);
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            transaction.update(showRef, {
              ep,
              history: [
                ...(data.history || []),
                `${data.ep} -> ${ep} on ${new Date().toLocaleDateString()}`,
              ],
              usage: (data.usage || 0) + 1,
            });
          });
        } catch (e) {
          console.error(e);
        }
      }

      async function editShowName(oldName) {
        if (!auth.currentUser) return alert("Please sign in");
        const newName = prompt("Edit donghua name:", oldName)?.trim();
        if (!newName || newName === oldName || !isValidShowName(newName)) return;
        const oldRef = getShowRef(oldName);
        const newRef = getShowRef(newName);
        try {
          await runTransaction(db, async (transaction) => {
            const oldSnap = await transaction.get(oldRef);
            const newSnap = await transaction.get(newRef);
            if (!oldSnap.exists()) return;
            if (newSnap.exists())
              return alert("A show with this name already exists.");
            transaction.set(newRef, oldSnap.data());
            transaction.delete(oldRef);
          });
        } catch (e) {
          console.error(e);
        }
      }

      async function deleteShow(show) {
        if (!auth.currentUser) return alert("Please sign in");
        if (!confirm(`Delete ${show}?`)) return;
        try {
          await deleteDoc(getShowRef(show));
        } catch (e) {
          console.error(e);
        }
      }

      // --- Dark mode ---
      function toggleDarkMode() {
        darkMode = !darkMode;
        document.body.classList.toggle("dark-mode", darkMode);
        localStorage.setItem("darkMode", darkMode);
      }

      // --- Import/Export ---
      function exportJSON() {
        const blob = new Blob([JSON.stringify(shows, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "donghua_shows.json";
        a.click();
      }

      function handleImport(event) {
        if (!auth.currentUser) return alert("Please sign in");
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (!imported || typeof imported !== "object" || Array.isArray(imported)) {
              throw new Error("Imported file must contain a show object.");
            }
            const entries = Object.entries(imported).map(([name, data]) => [
              String(name).trim(),
              data,
            ]);
            if (!entries.every(([name]) => isValidShowName(name))) return;

            await Promise.all(
              entries.map(([name, data]) => {
                shows[name] = normalizeShow(data);
                return saveShowToDB(name);
              })
            );
            render();
            alert("Import successful!");
          } catch (err) {
            console.error(err);
            alert("Import failed");
          } finally {
            event.target.value = "";
          }
        };
        reader.readAsText(file);
      }

      function exportCSV() {
        const headers = ["Name", "Episode", "Created", "History", "Usage"];
        let csv = headers.map(csvEscape).join(",") + "\n";
        Object.entries(shows).forEach(([name, data]) => {
          csv +=
            [
              name,
              data.ep,
              new Date(data.created).toISOString(),
              data.history.join(" | "),
              data.usage,
            ]
              .map(csvEscape)
              .join(",") + "\n";
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
        a.download = "donghua_shows.csv";
        a.click();
      }

      function csvEscape(value) {
        const stringValue = String(value ?? "");
        const safeValue = /^[=+\-@]/.test(stringValue)
          ? `'${stringValue}`
          : stringValue;
        return `"${safeValue.replaceAll('"', '""')}"`;
      }

      // --- Pagination ---
      function changePageSize() {
        showsPerPage = parseInt(
          document.getElementById("pageSizeSelect").value
        );
        currentPage = 1;
        render();
      }
      function jumpToPage() {
        const p = parseInt(document.getElementById("jumpPage").value);
        if (!isNaN(p)) currentPage = p;
        render();
      }
      function nextPage() {
        const totalPages = Math.ceil(filteredShows().length / showsPerPage);
        if (currentPage < totalPages) currentPage++;
        render();
      }
      function prevPage() {
        if (currentPage > 1) currentPage--;
        render();
      }

      function filteredShows() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();
        let result = Object.entries(shows).filter(([name]) =>
          name.toLowerCase().includes(searchTerm)
        );
        const sortBy = document.getElementById("sortSelect").value;
        if (sortBy === "created")
          result.sort((a, b) => a[1].created - b[1].created);
        else if (sortBy === "name")
          result.sort((a, b) => a[0].localeCompare(b[0]));
        else if (sortBy === "ep") result.sort((a, b) => b[1].ep - a[1].ep);
        return result;
      }

      function updateStats() {
        const entries = Object.entries(shows);
        const totalShows = entries.length;
        const inProgress = entries.filter(([, data]) => data.ep > 0).length;
        const episodesWatched = entries.reduce(
          (total, [, data]) => total + data.ep,
          0
        );
        const mostUsed = entries.reduce(
          (top, entry) => (!top || entry[1].usage > top[1].usage ? entry : top),
          null
        );

        document.getElementById("totalShowsStat").textContent = totalShows;
        document.getElementById("inProgressStat").textContent = inProgress;
        document.getElementById("episodesWatchedStat").textContent =
          episodesWatched;

        const mostUsedStat = document.getElementById("mostUsedStat");
        const mostUsedNote = document.getElementById("mostUsedNote");
        if (mostUsed && mostUsed[1].usage > 0) {
          mostUsedStat.textContent = mostUsed[0];
          mostUsedStat.title = mostUsed[0];
          mostUsedNote.textContent = `${mostUsed[1].usage} updates`;
        } else {
          mostUsedStat.textContent = "-";
          mostUsedStat.removeAttribute("title");
          mostUsedNote.textContent = "No usage yet";
        }
      }

      function showEmptyState(message, detail) {
        const list = document.getElementById("showList");
        const emptyState = document.createElement("div");
        emptyState.className = "empty-state";

        const title = document.createElement("strong");
        title.textContent = message;
        emptyState.appendChild(title);

        const text = document.createElement("span");
        text.textContent = detail;
        emptyState.appendChild(text);
        list.appendChild(emptyState);
      }

      function createShowRow(show, data, includeUsage = false) {
        const div = document.createElement("div");
        div.className = "show";

        const infoDiv = document.createElement("div");
        infoDiv.className = "show-info";

        const title = document.createElement("strong");
        title.textContent = show;
        infoDiv.appendChild(title);

        const metaDiv = document.createElement("div");
        metaDiv.className = "show-meta";

        const episodeBadge = document.createElement("span");
        episodeBadge.className = "episode-badge";
        episodeBadge.textContent = `Episode ${data.ep}`;
        metaDiv.appendChild(episodeBadge);

        if (includeUsage) {
          const usageBadge = document.createElement("span");
          usageBadge.className = "usage-badge";
          usageBadge.textContent = `Used ${data.usage} times`;
          metaDiv.appendChild(usageBadge);
        }

        infoDiv.appendChild(metaDiv);

        const historyDiv = document.createElement("div");
        historyDiv.className = "history";
        const lastLog =
          data.history.length > 0
            ? data.history[data.history.length - 1]
            : "No history";
        historyDiv.textContent = `Latest: ${lastLog}`;
        infoDiv.appendChild(historyDiv);
        div.appendChild(infoDiv);

        const buttonsDiv = document.createElement("div");
        buttonsDiv.className = "buttons";

        const buttonConfigs = [
          ["+", "inc-btn", `Increase episode for ${show}`, () => incrementEpisode(show)],
          ["-", "dec-btn", `Decrease episode for ${show}`, () => decrementEpisode(show)],
          ["Edit ep", "update-btn", `Edit episode for ${show}`, () => updateEpisode(show)],
          ["Rename", "edit-btn", `Rename ${show}`, () => editShowName(show)],
          ["Delete", "delete-btn", `Delete ${show}`, () => deleteShow(show)],
        ];

        buttonConfigs.forEach(([label, className, ariaLabel, onClick]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = className;
          button.textContent = label;
          button.setAttribute("aria-label", ariaLabel);
          button.addEventListener("click", onClick);
          buttonsDiv.appendChild(button);
        });

        div.appendChild(buttonsDiv);
        return div;
      }

      function showFrequent() {
        const topShows = Object.entries(shows)
          .sort((a, b) => b[1].usage - a[1].usage)
          .slice(0, 10);
        const list = document.getElementById("showList");
        list.innerHTML = "";
        if (topShows.length === 0) {
          showEmptyState("No shows yet", "Add a few titles to see your most used list.");
        }
        topShows.forEach(([show, data]) => {
          list.appendChild(createShowRow(show, data, true));
        });
        document.getElementById("pageInfo").textContent =
          "Top 10 frequently used shows";
      }

      function render() {
        updateStats();
        const list = document.getElementById("showList");
        list.innerHTML = "";
        const sortedShows = filteredShows();
        const totalPages = Math.ceil(sortedShows.length / showsPerPage) || 1;
        if (sortedShows.length === 0) {
          showEmptyState(
            "No matching shows",
            "Add new titles or adjust your search to bring them back."
          );
        }
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * showsPerPage;
        const pageShows = sortedShows.slice(start, start + showsPerPage);
        pageShows.forEach(([show, data]) => {
          list.appendChild(createShowRow(show, data));
        });
        document.getElementById(
          "pageInfo"
        ).textContent = `Page ${currentPage} of ${totalPages}`;
      }
      // --- Event Listeners ---
      document
        .getElementById("addShowsBtn")
        .addEventListener("click", addShows);
      document
        .getElementById("exportJSONBtn")
        .addEventListener("click", exportJSON);
      document.getElementById("importBtn").addEventListener("click", () => {
        document.getElementById("importFile").click();
      });
      document
        .getElementById("importFile")
        .addEventListener("change", handleImport);
      document
        .getElementById("exportCSVBtn")
        .addEventListener("click", exportCSV);
      document
        .getElementById("darkModeBtn")
        .addEventListener("click", toggleDarkMode);
      document
        .getElementById("frequentBtn")
        .addEventListener("click", showFrequent);
      document.getElementById("searchInput").addEventListener("input", render);
      document.getElementById("sortSelect").addEventListener("change", render);
      document
        .getElementById("pageSizeSelect")
        .addEventListener("change", changePageSize);
      document.getElementById("jumpPage").addEventListener("input", jumpToPage);
      document.getElementById("prevBtn").addEventListener("click", prevPage);
      document.getElementById("nextBtn").addEventListener("click", nextPage);

      render();
    </script>
  </body>
</html>
