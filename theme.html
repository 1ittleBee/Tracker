<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dark Mode - Donghua Episode Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Dark Mode</h1>
          <p class="subtitle">
            Switch the tracker between light and dark display modes.
          </p>
        </div>
        <a class="back-link" href="index.html">Back to Tracker</a>
      </header>

      <section class="function-panel" aria-label="Dark mode">
        <h2>Theme control</h2>
        <p>
          The Dark Mode button on the tracker toggles the app theme and saves
          the choice on this device.
        </p>
        <a class="action-link" href="index.html">Go to Dark Mode</a>
      </section>
    </main>
  </body>
</html>
